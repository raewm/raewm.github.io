<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMatt</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --dark-bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-height: 100vh;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1rem;
                gap: 1.5rem;
            }
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-align: center;
        }

        .logo-container {
            width: 100%;
            max-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.2));
        }

        @media (max-width: 480px) {
            .logo-container {
                max-width: 200px;
                margin-bottom: 1rem;
            }
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .phrase-display {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.4;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-green);
        }

        @media (max-width: 480px) {
            .phrase-display {
                font-size: 1.4rem;
                min-height: 100px;
            }
        }

        .generate-btn {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            justify-content: center;
        }

        .generate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .history-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .history-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>


    <script type="text/babel">

        const { motion, AnimatePresence } = window.FramerMotion || window.Motion || _FramerMotion;

        // --- Generator Logic ---

            "It would be much better with a",
            "I was thinking, maybe add a",
            "Could we integrate a",
            "Is there any way to fit a",
            "Let's just slap on a",
            "It's not finished without a",
        ];

        const adjectives = [
            "high power", "high speed", "heavy duty", "really big", "really really big",
            "large", "bigger", "faster", "cheaper", "low weight", "high altitude",
            "liquid fueled", "solid state", "quantum-stabilized", "multi-modal",
            "blockchain-enabled", "cryogenic", "nuclear-grade", "military-spec",
            "consumer-ready", "hyper-converged", "edge-optimized", "cloud-native",
            "sub-zero", "over-engineered",
        ];

        const technologies = [
            "machine vision based", "optically tracked", "automatically following",
            "voice activated", "mercury containing", "recursive neural", "deep learning",
            "generative AI", "plasma-coupled", "ultrasonic", "infrared-guided",
            "laser-etched", "magnetically-levitated", "pneumatically-driven",
            "hydraulically-offset",
        ];

        const nouns = [
            "capacitor", "optical sensor", "rocket thruster", "motor", "tesla coil",
            "wing", "baloon", "servo", "transmitter", "gimbal", "code patch",
            "dredge pump", "mainframe", "flux capacitor", "hover-prop", "cooling tower",
            "super-computer", "actuator", "centrifuge", "particle filter",
            "battery bank", "solar array",
        ];

        const suffixes = [
            "powered by a potato", "but in space", "with GPT-5 integration",
            "running on a Raspberry Pi", "controlled by a Wii Remote",
            "built out of recycled scrap", "for better synergies",
            "to optimize the pipeline", "that costs exactly $0.50",
            "which is totally safe", "using only Python 2",
            "hosted on a floppy disk", "that glows in the dark",
            "with zero latency",
        ];

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        const darkParticipants = [
            "a slightly overweight guy with a dad bod",
            "three lesbians in a trench coat",
            "an albino midget",
            "a Buddhist monk",
            "a very docile goat",
            "a sweaty gym bro",
            "an amateur dominatrix",
            "a disappointed step-mom",
            "two furry enthusiasts",
            "a frustrated accountant",
            "a latex-clad contortionist",
            "the pool boy",
            "a desperate housewife",
            "a well-endowed centaur",
            "a heavily pierced barista"
        ];

        const darkObjects = [
            "a vibrating butt plug",
            "a massive dildo",
            "some fuzzy handcuffs",
            "a pearl necklace",
            "a pocket pussy",
            "a ball gag",
            "a strap-on",
            "a gimp suit",
            "a heavy-duty leather whip",
            "a bottle of flavored lube",
            "some edible underwear",
            "a suspiciously shaped vegetable",
            "a jar of mayonnaise",
            "a collection of anal beads",
            "a blindfold and nipple clamps"
        ];

        const darkActions = [
            "aggressively riding",
            "spanking",
            "sensually spanking",
            "going to town on",
            "violently humping",
            "teasing",
            "hate-fucking",
            "tenderly caressing",
            "double-penetrating",
            "motorboating",
            "face-sitting on",
            "pegging",
            "relentlessly edging",
            "awkwardly scissoring",
            "deep-throating"
        ];

        const darkModifiers = [
            "while a cuckold watches from the closet",
            "until someone gets a friction burn",
            "while crying softly",
            "with unexpected enthusiasm",
            "for the rest of the night",
            "while checking their email",
            "in the back of a Prius",
            "while reciting the Constitution",
            "covered in baby oil",
            "during a Zoom meeting",
            "while wearing crocs",
            "until the police arrive",
            "with a surprisingly gentle touch",
            "in full clown makeup",
            "while listening to smooth jazz"
        ];

        function generateDarkPhrase() {
            const intro = getRandom(intros);
            const participant = getRandom(darkParticipants);
            const action = getRandom(darkActions);
            const object = getRandom(darkObjects);
            const modifier = Math.random() > 0.2 ? getRandom(darkModifiers) : "";

            let phrase = `${intro} ${participant} ${action} ${object} ${modifier}`.replace(/\s+/g, ' ').trim();
            phrase = fixGrammar(phrase);
            return phrase + ".";
        }

        function fixGrammar(phrase) {
            // Fix A/An (Basic set for simple implementation)
            const phrasesToFix = [
                " a "
            ];

            let fixedPhrase = phrase;
            phrasesToFix.forEach(p => {
                let index = fixedPhrase.toLowerCase().indexOf(p);
                while (index !== -1) {
                    const afterA = fixedPhrase.substring(index + p.length);
                    // Check if the next word starts with a vowel
                    if (/^[aeiou]/i.test(afterA)) {
                        fixedPhrase = fixedPhrase.substring(0, index) + p.replace("a ", "an ") + afterA;
                    }
                    // Look for the next occurrence, starting after the current 'a'
                    index = fixedPhrase.toLowerCase().indexOf(p, index + 2);
                }
            });
            // Handle edge case where phrase starts with "A "
            if (fixedPhrase.toLowerCase().startsWith("a ")) {
                const afterA = fixedPhrase.substring(2);
                if (/^[aeiou]/i.test(afterA)) {
                    fixedPhrase = fixedPhrase.substring(0, 1) + "n" + fixedPhrase.substring(1);
                }
            }

            return fixedPhrase;
        }

        function generatePhrase() {
            const intro = getRandom(intros);
            const adj = getRandom(adjectives);
            const tech = Math.random() > 0.3 ? getRandom(technologies) : "";
            const noun = getRandom(nouns);
            const suffix = Math.random() > 0.5 ? getRandom(suffixes) : "";

            let phrase = `${intro} ${adj} ${tech} ${noun} ${suffix}`.replace(/\s+/g, ' ').trim();

            phrase = fixGrammar(phrase);

            return phrase + ".";
        }

        // --- Logo Base64 ---

        // --- Components ---
        const App = () => {
            const [phrase, setPhrase] = useState("Click to generate a possibly real Matt request.");
            const [history, setHistory] = useState([]);
            const [isAnimating, setIsAnimating] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);

            useEffect(() => {
                // Initialize Lucide icons
                lucide.createIcons();
            }, []);

            const handleLogoClick = (e) => {
                // Get click coordinates relative to the rendered image
                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Calculate scale factors to match the original image size
                const scaleX = rect.width / e.target.naturalWidth;
                const scaleY = rect.height / e.target.naturalHeight;

                // Convert to original image pixel coordinates
                const originalX = Math.round(x / scaleX);
                const originalY = Math.round(y / scaleY);

                // Logging for debug
                console.log(`Original image coords: x=${originalX}, y=${originalY}`);

                // Define target area: exact coordinate range on the original image
                const isTargetArea = originalX >= 735 && originalX <= 770 && originalY >= 355 && originalY <= 380;

                if (isTargetArea && !isDarkMode) {
                    setIsDarkMode(true);
                    setPhrase("DARK SUGGESTION MODE ACTIVATED");
                    console.log("Dark mode activated!");
                }
            };

            const handleGenerate = () => {
                setIsAnimating(true);
                const newPhrase = isDarkMode ? generateDarkPhrase() : generatePhrase();

                setTimeout(() => {
                    setPhrase(newPhrase);
                    setHistory(prev => [newPhrase, ...prev].slice(0, 10));
                    setIsAnimating(false);
                }, 150);
            };

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="logo-container" onClick={handleLogoClick} style={{ cursor: 'pointer' }}>
                            <img src="logo.png" alt="AutoMatt Logo" className="logo-img" />
                        </div>
                    </header>

                    <main className="main-card">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={phrase}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.2 }}
                                className="phrase-display"
                            >
                                {phrase}
                            </motion.div>
                        </AnimatePresence>

                        <button
                            className="generate-btn"
                            onClick={handleGenerate}
                            disabled={isAnimating}
                        >
                            {!isAnimating ? (
                                <i data-lucide="sparkles" size="20"></i>
                            ) : (
                                <i data-lucide="refresh-cw" className="animate-spin"></i>
                            )}
                            <span style={{ marginLeft: '8px' }}>Generate Request</span>
                        </button>
                    </main>

                    <section className="history-section">
                        <div className="history-title">
                            <i data-lucide="history" size="14"></i>
                            Recent Requests
                        </div>
                        <div className="history-list">
                            {history.length === 0 ? (
                                <div className="history-item" style={{ textAlign: 'center', opacity: 0.5 }}>
                                    No history yet.
                                </div>
                            ) : (
                                history.map((item, index) => (
                                    <motion.div
                                        key={index + item}
                                        initial={{ opacity: 0, scale: 0.95 }}
                                        animate={{ opacity: 1, scale: 1 }}
                                        className="history-item"
                                    >
                                        {item}
                                    </motion.div>
                                ))
                            )}
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
